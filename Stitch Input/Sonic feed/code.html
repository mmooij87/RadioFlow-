<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Manrope:wght@200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#4f4633",
              "secondary-container": "#084a86",
              "surface-container-lowest": "#020f1c",
              "on-surface-variant": "#d3c5ac",
              "tertiary-container": "#9fc5f5",
              "surface-container-low": "#0e1d2a",
              "on-tertiary-fixed-variant": "#1f4972",
              "on-secondary-container": "#8bbbfe",
              "inverse-primary": "#795900",
              "on-secondary": "#00315d",
              "surface-container-high": "#1d2b39",
              "surface-container": "#12212e",
              "on-error-container": "#ffdad6",
              "on-error": "#690005",
              "on-tertiary-container": "#29527b",
              "inverse-surface": "#d5e4f6",
              "primary-fixed": "#ffdf9e",
              "on-background": "#d5e4f6",
              "primary-container": "#f3b91a",
              "on-primary-fixed-variant": "#5b4300",
              "inverse-on-surface": "#243240",
              "secondary-fixed-dim": "#a4c9ff",
              "surface-container-highest": "#283644",
              "secondary-fixed": "#d4e3ff",
              "outline": "#9c8f79",
              "on-tertiary": "#003258",
              "error-container": "#93000a",
              "tertiary": "#c9e0ff",
              "surface-bright": "#2d3a49",
              "on-primary-fixed": "#261a00",
              "on-tertiary-fixed": "#001d36",
              "background": "#061421",
              "tertiary-fixed-dim": "#a3caf9",
              "surface-tint": "#f8bd20",
              "surface-dim": "#061421",
              "on-primary-container": "#664b00",
              "surface-variant": "#283644",
              "surface": "#061421",
              "primary": "#ffd98a",
              "on-secondary-fixed-variant": "#034883",
              "tertiary-fixed": "#d1e4ff",
              "secondary": "#a4c9ff",
              "on-surface": "#d5e4f6",
              "on-secondary-fixed": "#001c39",
              "primary-fixed-dim": "#f8bd20",
              "on-primary": "#3f2e00",
              "error": "#ffb4ab"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .v-slide-gradient {
            background: linear-gradient(0deg, rgba(6,20,33,1) 0%, rgba(6,20,33,0.8) 20%, rgba(6,20,33,0) 50%);
        }
        .viz-bar {
            width: 3px;
            background-color: #f3b91a;
            margin: 0 1px;
        }
        .active-glow {
            box-shadow: 0 0 40px rgba(243, 185, 26, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body select-none overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 w-full bg-transparent">
<div class="flex items-center gap-4">
<button class="text-yellow-400 dark:text-[#f3b91a] scale-95 active:duration-100 hover:text-[#ffd98a] transition-colors">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
<h1 class="text-3xl font-black text-[#f3b91a] tracking-tighter font-['Space_Grotesk'] uppercase">KINK</h1>
<div class="flex items-center gap-4">
<button class="text-yellow-400 dark:text-[#f3b91a] scale-95 active:duration-100 hover:text-[#ffd98a] transition-colors">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</div>
</header>
<!-- Main V-Slide Feed Container -->
<main class="h-screen w-full snap-y snap-mandatory overflow-y-scroll scrollbar-hide">
<!-- Active Track: Queens of the Stone Age -->
<section class="relative h-screen w-full snap-start overflow-hidden flex flex-col">
<!-- Full Screen Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Rock concert with intense yellow lighting" class="w-full h-full object-cover" data-alt="Gritty rock album art with Queens of the Stone Age aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsOtXUoDKZWwfFYy8gE60DqUQYAPpGI9czTxENe4tf2KG8wxxYxP6el0IIhJxBkNJDeUv6ki9QjmddpLvAceV2r26XZTYGRrpsq7Uebzphll77M5IhDQpRG3U7iNCuPCBnwgkSzj2RvcRZ7tCe2zaNh8ozYFPIwbSjxUCxsSaFc5wUeVAxtjVD1DkhcudPX0zYhpkmJyXdU0-lDwxrn5Pf1p8euIn9HdZACgIt4oik-tkmLFriIowWEZCSx06ocfc9w2BySEQTqvez"/>
<div class="absolute inset-0 v-slide-gradient"></div>
</div>
<!-- UI Overlay Content -->
<div class="relative z-10 mt-auto px-6 pb-32 w-full max-w-4xl mx-auto flex flex-col items-start">
<!-- Track Status & Visualizer -->
<div class="flex items-center gap-3 mb-6">
<div class="flex items-end h-6 gap-[2px]">
<div class="viz-bar h-[40%]"></div>
<div class="viz-bar h-[80%]"></div>
<div class="viz-bar h-[100%]"></div>
<div class="viz-bar h-[60%]"></div>
<div class="viz-bar h-[90%]"></div>
</div>
<span class="font-label text-primary text-[10px] tracking-[0.2em] uppercase font-bold">Now Playing • KINK DISTORTION</span>
</div>
<!-- Artist and Title -->
<div class="space-y-1 mb-10 w-full">
<h3 class="font-body text-on-background text-2xl md:text-3xl font-light tracking-tight opacity-90">Queens of the Stone Age</h3>
<h2 class="font-headline text-5xl md:text-8xl font-bold leading-[0.9] -ml-1 text-on-background uppercase tracking-tighter">
                        Paper<br/>Machete
                    </h2>
</div>
<!-- Interaction Hub -->
<div class="flex items-center gap-6 w-full">
<!-- Heart CTA -->
<button class="group flex flex-col items-center gap-2">
<div class="w-14 h-14 rounded-full border border-primary/20 flex items-center justify-center bg-surface-container/40 backdrop-blur-sm group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<span class="font-label text-[10px] uppercase font-black tracking-widest text-primary">FAVORITE</span>
</button>
<!-- Spotify CTA -->
<button class="flex-1 bg-primary-container hover:bg-primary transition-colors h-14 rounded-sm flex items-center justify-between px-6 active:scale-[0.98]">
<span class="font-headline font-black text-on-primary-container uppercase text-sm tracking-widest">Open in Spotify</span>
<span class="material-symbols-outlined text-on-primary-container" data-icon="open_in_new">open_in_new</span>
</button>
<!-- Share CTA -->
<button class="w-14 h-14 rounded-full border border-on-surface/10 flex items-center justify-center bg-surface-container/20 backdrop-blur-sm">
<span class="material-symbols-outlined text-on-surface text-2xl" data-icon="share">share</span>
</button>
</div>
</div>
<!-- Right Side Meta Actions (TikTok Style) -->
<div class="absolute right-6 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-8 items-center">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-on-surface/60 text-3xl" data-icon="add_circle">add_circle</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-on-surface/60 text-3xl" data-icon="chat">chat</span>
<span class="font-label text-[10px] text-on-surface/40">1.2k</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-on-surface/60 text-3xl" data-icon="playlist_add">playlist_add</span>
</div>
</div>
</section>
<!-- Previous Track (Hidden initially for snap) -->
<section class="relative h-screen w-full snap-start overflow-hidden flex flex-col bg-surface-container-lowest">
<div class="absolute inset-0 z-0 opacity-40 grayscale">
<img alt="Indie rock visual" class="w-full h-full object-cover" data-alt="Grungy monochromatic rock stage background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsqIoKIPmUAxSa1-MUpOEumrOFyO9GdwGUivCOBXdgXGrQYGl-zbfTAJ1WS-aEy5563RYc34-rnR8YsnEcfy6HCuUs8MVl2nk1od9AYp8o2UK42klM4M7JrUDthJRL6I9vW6bKJzfHwAlOTyd9rWIoXOpvPF6hz8ANI-gAFSUgh45bLu3P3h_9FpweSalFINO6Ymhkbzz3aWt-N6e-Xxzk9vmM_u_2i6m3MdbHwpLN3tqrY10xKwQ-05NF4etlTt95LS5nhZftPjpB"/>
<div class="absolute inset-0 v-slide-gradient"></div>
</div>
<div class="relative z-10 m-auto flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-primary/20 text-6xl" data-icon="keyboard_double_arrow_up">keyboard_double_arrow_up</span>
<p class="font-headline text-on-surface/20 uppercase tracking-[1em] text-sm mt-4">Swipe for more</p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pb-safe h-20 px-8 bg-[#12212e]/80 backdrop-blur-md z-50 shadow-[0_-4px_40px_rgba(243,185,26,0.08)]">
<!-- Stations -->
<a class="flex flex-col items-center justify-center text-[#d5e4f6]/60 pt-2 hover:text-[#f3b91a] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="radio">radio</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-widest mt-1">Stations</span>
</a>
<!-- Feed (Active) -->
<a class="flex flex-col items-center justify-center text-[#f3b91a] border-t-2 border-[#f3b91a] pt-2 transition-all scale-110 duration-200 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="vertical_split" style="font-variation-settings: 'FILL' 1;">vertical_split</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-widest mt-1">Feed</span>
</a>
<!-- Favorites -->
<a class="flex flex-col items-center justify-center text-[#d5e4f6]/60 pt-2 hover:text-[#f3b91a] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
<span class="font-['Manrope'] font-bold text-[10px] uppercase tracking-widest mt-1">Favorites</span>
</a>
</nav>
<!-- Progress Indicator (Top of the feed) -->
<div class="fixed top-[72px] left-0 w-full h-[2px] bg-white/10 z-50 px-6">
<div class="h-full bg-primary w-1/3 shadow-[0_0_10px_rgba(243,185,26,0.5)]"></div>
</div>
</body></html>
